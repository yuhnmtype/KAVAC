<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký — KAVAC Smart Lock</title>
    <link rel="stylesheet" href="../css/global.css"><link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('kavac_theme')||'dark'); })();</script>
</head>
<body>
<div class="auth-page">
    <div class="auth-visual">
        <div class="auth-visual-orb"></div>
        <div class="auth-visual-content">
            <a href="../index.html" class="logo">
                <img src="../images/kavac-logo-dark.svg"  alt="KAVAC" class="logo-img logo-for-dark">
                <img src="../images/kavac-logo-light.svg" alt="KAVAC" class="logo-img logo-for-light">
            </a>
            <div class="auth-visual-icon"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
            <h2>Tham Gia KAVAC</h2>
            <p>Tạo tài khoản để theo dõi đơn hàng, quản lý thiết bị và nhận ưu đãi độc quyền.</p>
        </div>
    </div>
    <div class="auth-form-panel"><div class="auth-form-wrap">
        <div style="display:flex;justify-content:flex-end;margin-bottom:32px">
            <button class="theme-toggle" title="Đổi giao diện"><svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg><svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
        </div>
        <h1>Đăng Ký</h1>
        <p class="auth-sub">Đã có tài khoản? <a href="login.html">Đăng nhập →</a></p>
        <div class="form-row"><div class="form-group"><label>Họ và Tên *</label><input type="text" id="regName" placeholder="Nguyễn Văn A"><div class="input-hint" id="nameHint">Vui lòng nhập họ tên</div></div><div class="form-group"><label>Số Điện Thoại</label><input type="tel" id="regPhone" placeholder="0901 234 567"></div></div>
        <div class="form-group"><label>Email *</label><input type="email" id="regEmail" placeholder="ten@email.com"><div class="input-hint" id="regEmailHint">Email không hợp lệ</div></div>
        <div class="form-group"><label>Mật Khẩu *</label><div class="password-wrap"><input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự"><span class="toggle-pw" id="togglePw"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span></div><div class="input-hint" id="regPwHint">Mật khẩu tối thiểu 6 ký tự</div></div>
        <div class="form-group"><label>Địa Chỉ (TP.HCM)</label><input type="text" id="regAddress" placeholder="Số nhà, đường, quận, TP.HCM"></div>
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:24px;font-size:0.82rem;color:var(--muted)"><input type="checkbox" id="agree" style="margin-top:2px;accent-color:var(--gold)"><label for="agree">Tôi đồng ý với <a href="#" style="color:var(--gold)">Điều Khoản</a> và <a href="#" style="color:var(--gold)">Chính Sách Bảo Mật</a> của KAVAC</label></div>
        <button class="btn-primary btn-full" id="regBtn" onclick="handleRegister()">Tạo Tài Khoản</button>
        <p class="auth-form-footer" style="margin-top:28px"><a href="../index.html">← Về trang chủ</a></p>
    </div></div>
</div>
<script src="../js/global.js"></script>
<script>
function handleRegister(){
    const name=document.getElementById('regName').value.trim(),email=document.getElementById('regEmail').value.trim(),pass=document.getElementById('regPassword').value,agree=document.getElementById('agree').checked,btn=document.getElementById('regBtn');
    let ok=true;
    if(!name){document.getElementById('nameHint').classList.add('show');ok=false;}else document.getElementById('nameHint').classList.remove('show');
    if(!email.includes('@')){document.getElementById('regEmailHint').classList.add('show');ok=false;}else document.getElementById('regEmailHint').classList.remove('show');
    if(pass.length<6){document.getElementById('regPwHint').classList.add('show');ok=false;}else document.getElementById('regPwHint').classList.remove('show');
    if(!agree){Toast.show('Vui lòng đồng ý điều khoản dịch vụ','error');ok=false;}
    if(!ok)return;
    btn.classList.add('btn-loading');btn.textContent='Đang tạo tài khoản...';
    fetch('/KAVAC-1.0-SNAPSHOT/api/users/register',{method:'POST',headers:{'Content-Type':'application/json'},signal:AbortSignal.timeout(3000),body:JSON.stringify({full_name:name,email,password_hash:pass,phone:document.getElementById('regPhone').value,address_default:document.getElementById('regAddress').value})})
    .then(r=>r.ok?r.json():Promise.reject()).then(user=>{localStorage.setItem('kavac_user',JSON.stringify(user));Toast.show(`Chào mừng ${name}! 🎉`,'success');setTimeout(()=>window.location.href='../index.html',1000);})
    .catch(()=>{localStorage.setItem('kavac_user',JSON.stringify({full_name:name,email,role:'CUSTOMER'}));Toast.show(`Chào mừng ${name}! 🎉`,'success');setTimeout(()=>window.location.href='../index.html',1000);});
}
document.getElementById('togglePw').addEventListener('click',()=>{const i=document.getElementById('regPassword');i.type=i.type==='password'?'text':'password';});
</script>
</body></html>
