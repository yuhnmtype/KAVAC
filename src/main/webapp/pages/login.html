<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — KAVAC Smart Lock</title>
    <link rel="stylesheet" href="../css/global.css"><link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('kavac_theme')||'dark'); })();</script>
</head>
<body>
<div class="auth-page">
    <div class="auth-visual">
        <div class="auth-visual-orb"></div>
        <div class="auth-visual-content">
            <a href="../index.html" class="logo">
                <img src="../images/kavac-logo-dark.svg"  alt="KAVAC" class="logo-img logo-for-dark">
                <img src="../images/kavac-logo-light.svg" alt="KAVAC" class="logo-img logo-for-light">
            </a>
            <div class="auth-visual-icon"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg></div>
            <h2>Chào Mừng Trở Lại</h2>
            <p>Đăng nhập để quản lý thiết bị KAVAC, theo dõi đơn hàng và xem lịch sử mở cửa.</p>
        </div>
    </div>
    <div class="auth-form-panel"><div class="auth-form-wrap">
        <div style="display:flex;justify-content:flex-end;margin-bottom:32px">
            <button class="theme-toggle" title="Đổi giao diện"><svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg><svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
        </div>
        <h1>Đăng Nhập</h1>
        <p class="auth-sub">Chưa có tài khoản? <a href="register.html">Đăng ký ngay →</a></p>
        <div id="loginError" style="display:none;background:rgba(224,82,82,0.1);border:1px solid var(--danger);border-radius:var(--radius-sm);padding:12px 16px;font-size:0.85rem;color:var(--danger);margin-bottom:20px"></div>
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="ten@email.com"><div class="input-hint" id="emailHint">Email không hợp lệ</div></div>
        <div class="form-group"><label>Mật Khẩu</label><div class="password-wrap"><input type="password" id="loginPassword" placeholder="••••••••"><span class="toggle-pw" id="togglePw"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span></div><div class="input-hint" id="pwHint">Mật khẩu tối thiểu 6 ký tự</div></div>
        <div style="text-align:right;margin-bottom:28px"><a href="#" style="font-size:0.8rem;color:var(--muted)">Quên mật khẩu?</a></div>
        <button class="btn-primary btn-full" id="loginBtn" onclick="handleLogin()">Đăng Nhập</button>
        <div class="divider">hoặc</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <button class="btn-outline" style="width:100%;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:0.82rem">🇬 Google</button>
            <button class="btn-outline" style="width:100%;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:0.82rem">📘 Facebook</button>
        </div>
        <p class="auth-form-footer" style="margin-top:32px"><a href="../index.html">← Về trang chủ</a></p>
    </div></div>
</div>
<script src="../js/global.js"></script>
<script>
const DEMO = [{email:'admin@kavac.vn',password:'admin123',full_name:'Admin KAVAC',role:'ADMIN'},{email:'khach@gmail.com',password:'123456',full_name:'Khách Hàng Demo',role:'CUSTOMER'}];
function handleLogin(){
    const email=document.getElementById('loginEmail').value.trim(), pass=document.getElementById('loginPassword').value;
    const errEl=document.getElementById('loginError'), btn=document.getElementById('loginBtn');
    let ok=true;
    if(!email.includes('@')){document.getElementById('emailHint').classList.add('show');document.getElementById('loginEmail').classList.add('error');ok=false;}
    else{document.getElementById('emailHint').classList.remove('show');document.getElementById('loginEmail').classList.remove('error');}
    if(pass.length<6){document.getElementById('pwHint').classList.add('show');document.getElementById('loginPassword').classList.add('error');ok=false;}
    else{document.getElementById('pwHint').classList.remove('show');document.getElementById('loginPassword').classList.remove('error');}
    if(!ok)return;
    btn.classList.add('btn-loading');btn.textContent='Đang đăng nhập...';
    fetch('/KAVAC-1.0-SNAPSHOT/api/users/login',{method:'POST',headers:{'Content-Type':'application/json'},signal:AbortSignal.timeout(3000),body:JSON.stringify({email,password_hash:pass})})
    .then(r=>r.ok?r.json():Promise.reject()).then(user=>{localStorage.setItem('kavac_user',JSON.stringify(user));Toast.show(`Chào mừng, ${user.full_name}! 🎉`,'success');const rd=new URLSearchParams(window.location.search).get('redirect');setTimeout(()=>window.location.href=rd?`${rd}.html`:'../index.html',800);})
    .catch(()=>{const user=DEMO.find(u=>u.email===email&&u.password===pass);if(user){localStorage.setItem('kavac_user',JSON.stringify(user));Toast.show(`Chào mừng, ${user.full_name}! 🎉`,'success');setTimeout(()=>window.location.href='../index.html',800);}else{errEl.textContent='Email/mật khẩu không đúng. Demo: khach@gmail.com / 123456';errEl.style.display='block';btn.classList.remove('btn-loading');btn.textContent='Đăng Nhập';}});
}
document.getElementById('togglePw').addEventListener('click',()=>{const i=document.getElementById('loginPassword');i.type=i.type==='password'?'text':'password';});
document.addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
</script>
</body></html>
